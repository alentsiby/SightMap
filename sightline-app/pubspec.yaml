name: sightline
description: "Point your phone at a mountain. Get its name and directions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  flutter_compass: ^0.8.1
  url_launcher: ^6.3.1
  http: ^1.3.0
  share_plus: ^10.1.4
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
